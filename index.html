<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Rubrica Gemelli</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rubrica">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f7f7f7;
      --text:     #111111;
      --muted:    #888888;
      --border:   #e5e5e5;
      --accent:   #0891b2;
      --num:      #0891b2;
      --modal-bg: #ffffff;
    }
    [data-theme="dark"] {
      --bg:       #0c0c0c;
      --surface:  #161616;
      --text:     #ececec;
      --muted:    #666666;
      --border:   #222222;
      --accent:   #20b8cd;
      --num:      #20b8cd;
      --modal-bg: #111111;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 3rem;
      transition: background .2s, color .2s;
      font-size: 15px;
    }

    .inner {
      width: 90%;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      padding: 1rem 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .9rem;
    }
    .header-title {
      color: var(--accent);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .02em;
      flex: 1;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .header-count {
      color: var(--muted);
      font-size: .75rem;
    }
    .btn-theme {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: .85rem;
      width: 1.9rem;
      height: 1.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .btn-theme:hover { border-color: var(--accent); color: var(--accent); }

    #searchBar {
      width: 100%;
      padding: .7rem 1.1rem;
      font-size: .95rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .2s;
      font-family: inherit;
    }
    #searchBar::placeholder { color: var(--muted); }
    #searchBar:focus { border-color: var(--accent); }

    .btn-row {
      display: flex;
      gap: .5rem;
      margin-top: .7rem;
    }
    .btn-row button {
      flex: 1;
      padding: .5rem;
      font-size: .8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
      letter-spacing: .01em;
    }
    .btn-row button:hover { border-color: var(--accent); color: var(--accent); }
    .btn-row button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #chips {
      display: flex;
      gap: .35rem;
      overflow-x: auto;
      padding: .65rem 0 .55rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: .22rem .65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Card contatti ── */
    main { padding: .75rem 0; }

    .contact-card {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: .4rem;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-weight: 500;
      font-size: .9rem;
      color: var(--text);
      margin-bottom: .3rem;
      line-height: 1.3;
    }
    .contact-numbers { display: flex; flex-wrap: wrap; gap: .4rem; }
    .num-pill {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .03em;
      transition: opacity .1s;
    }
    .num-pill:not(:last-child)::after { content: '·'; color: var(--border); margin-left: .4rem; }
    .num-pill:active { opacity: .6; }
    .contact-note {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .2rem;
    }
    .contact-cat { display: none; }

    .btn-edit {
      background: none;
      border: none;
      padding: .25rem;
      cursor: pointer;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      opacity: .45;
      transition: opacity .12s;
    }
    .btn-edit:hover { opacity: 1; color: var(--accent); }

    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: .88rem;
    }
    .state-msg .ico { margin-bottom: .5rem; }
    .state-msg .sub { font-size: .8rem; margin-top: .35rem; opacity: .6; }
    .spinner {
      width: 22px; height: 22px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #modalOverlay[hidden] { display: none; }
    #modalBox {
      background: var(--modal-bg);
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-width: 760px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      transition: background .2s;
    }
    .modal-title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .form-group { margin-bottom: .8rem; }
    .form-group label {
      display: block;
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: .25rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .9rem;
      color: var(--text);
      outline: none;
      background: var(--surface);
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: .5rem; margin-top: 1.1rem; }
    .btn-primary {
      flex: 1;
      padding: .65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:active { opacity: .85; }
    .btn-danger {
      padding: .65rem .9rem;
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:active { opacity: .75; }
    .btn-cancel {
      padding: .65rem .9rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <div class="header-top">
      <div class="header-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:.4rem"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.3 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Rubrica Gemelli</div>
      <div class="header-count" id="countLabel"></div>
      <button class="btn-theme" id="btnTheme" title="Cambia tema" aria-label="Cambia tema">◐</button>
    </div>
    <input type="search" id="searchBar" placeholder="Cerca nome o numero..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <div class="btn-row">
      <button id="btnAll" class="active">Mostra Tutti</button>
      <button id="btnNew">Nuovo Contatto</button>
    </div>
    <div id="chips"></div>
  </div>
</header>

<main>
  <div class="inner" id="contactList">
    <div class="state-msg">
      <div class="spinner"></div>
      <div>Caricamento rubrica...</div>
    </div>
  </div>
</main>

<div id="modalOverlay" hidden>
  <div id="modalBox">
    <div class="modal-title" id="modalTitle">Nuovo Contatto</div>
    <form id="contactForm" novalidate>
      <input type="hidden" id="fId">
      <div class="form-group">
        <label>Nome *</label>
        <input type="text" id="fNome" required placeholder="es. Cardiologia guardia">
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="fCategoria" required></select>
      </div>
      <div class="form-group">
        <label>Numeri (separati da virgola)</label>
        <input type="text" id="fNumeri" placeholder="es. 3111, 3112" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Note</label>
        <input type="text" id="fNote" placeholder="es. solo urgenze notturne">
      </div>
      <div class="modal-btns">
        <button type="button" class="btn-cancel" id="btnCancel">Annulla</button>
        <button type="button" class="btn-danger" id="btnDelete" hidden>Elimina</button>
        <button type="submit" class="btn-primary" id="btnSave">Salva</button>
      </div>
    </form>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCBaTVHVLRviELi21kH8FcPlsqrSxpIY-ZsYMbbQ-fQbpX7UcFLUx4yaqTse5ETxAc/exec';

let allContacts = [];
let categories  = [];
let activeCategory = null;
let activeSearch   = '';

// ── Tema ──────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('btnTheme').textContent = '◐';
  localStorage.setItem('rubrica-theme', theme);
}
(function initTheme() {
  const saved = localStorage.getItem('rubrica-theme') || 'dark';
  applyTheme(saved);
})();
document.getElementById('btnTheme').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  setupEvents();
  await loadData();
}

async function loadData() {
  try {
    showLoading();
    const [contacts, cats] = await Promise.all([
      apiFetch('getAll'),
      apiFetch('getCategorie'),
    ]);
    allContacts = contacts;
    categories  = cats;
    renderChips();
    renderContacts(allContacts);
  } catch (e) {
    showError(e.message);
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(action, params = {}) {
  const qs  = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}
async function apiPost(body) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chips');
  el.innerHTML = categories.map(c =>
    `<button class="chip${activeCategory === c.nome ? ' active' : ''}" data-cat="${esc(c.nome)}">${esc(c.nome)}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      activeCategory = activeCategory === cat ? null : cat;
      el.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
      document.getElementById('btnAll').classList.toggle('active', !activeCategory);
      applyFilters();
    });
  });
}

function applyFilters() {
  let result = allContacts;
  if (activeCategory) result = result.filter(c => c.categoria === activeCategory);
  if (activeSearch)   result = result.filter(c =>
    c.nome.toLowerCase().includes(activeSearch) ||
    String(c.numeri || '').includes(activeSearch)
  );
  renderContacts(result);
}

function renderContacts(contacts) {
  const el = document.getElementById('contactList');
  updateCount(contacts.length);
  if (!contacts.length) {
    el.innerHTML = '<div class="state-msg"><div class="ico">∅</div><div>Nessun risultato</div></div>';
    return;
  }
  el.innerHTML = contacts.map(c => {
    const nums  = String(c.numeri || '').split(',').map(n => n.trim()).filter(Boolean);
    const pills = nums.map(n => `<a class="num-pill" href="tel:${n}">${n}</a>`).join('');
    const note  = c.note ? `<div class="contact-note">${esc(String(c.note))}</div>` : '';
    return `
      <div class="contact-card">
        <div class="contact-info">
          <div class="contact-name">${esc(String(c.nome))}</div>
          <div class="contact-numbers">${pills}</div>
          ${note}
          <div class="contact-cat">${esc(String(c.categoria))}</div>
        </div>
        <button class="btn-edit" data-id="${c.id}" aria-label="Modifica"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      </div>`;
  }).join('');
  el.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEdit(btn.dataset.id));
  });
}

function showLoading() {
  document.getElementById('contactList').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><div>Caricamento...</div></div>';
  updateCount(null);
}
function showError(msg) {
  document.getElementById('contactList').innerHTML =
    `<div class="state-msg"><div class="ico">×</div><div>${esc(msg)}</div><div class="sub">Controlla la connessione e riprova</div></div>`;
  updateCount(null);
}
function updateCount(n) {
  document.getElementById('countLabel').textContent = n !== null ? `${n} contatti` : '';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ────────────────────────────────────────────────────────────────────
function setupEvents() {
  document.getElementById('searchBar').addEventListener('input', e => {
    activeSearch = e.target.value.toLowerCase().trim();
    applyFilters();
  });
  document.getElementById('btnAll').addEventListener('click', () => {
    activeCategory = null;
    activeSearch   = '';
    document.getElementById('searchBar').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('btnAll').classList.add('active');
    renderContacts(allContacts);
  });
  document.getElementById('btnNew').addEventListener('click', () => openModal(null));
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  document.getElementById('contactForm').addEventListener('submit', async e => {
    e.preventDefault();
    await saveContact();
  });
  document.getElementById('btnDelete').addEventListener('click', async () => {
    if (confirm('Eliminare questo contatto?')) await deleteContact();
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(contact) {
  const isNew = !contact;
  document.getElementById('modalTitle').textContent = isNew ? 'Nuovo Contatto' : 'Modifica Contatto';
  document.getElementById('fId').value    = contact?.id ?? '';
  document.getElementById('fNome').value  = contact?.nome ?? '';
  document.getElementById('fNumeri').value = contact?.numeri ?? '';
  document.getElementById('fNote').value  = contact?.note ?? '';
  document.getElementById('btnDelete').hidden = isNew;
  document.getElementById('fCategoria').innerHTML = categories.map(c =>
    `<option value="${esc(c.nome)}"${c.nome === contact?.categoria ? ' selected' : ''}>${esc(c.nome)}</option>`
  ).join('');
  document.getElementById('modalOverlay').hidden = false;
  setTimeout(() => document.getElementById('fNome').focus(), 50);
}
function openEdit(id) {
  const c = allContacts.find(x => String(x.id) === String(id));
  if (c) openModal(c);
}
function closeModal() { document.getElementById('modalOverlay').hidden = true; }

async function saveContact() {
  const id   = document.getElementById('fId').value;
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { alert('Il nome è obbligatorio'); return; }
  const data = {
    action:    id ? 'update' : 'add',
    ...(id && { id: Number(id) }),
    nome,
    categoria: document.getElementById('fCategoria').value,
    numeri:    document.getElementById('fNumeri').value.trim(),
    note:      document.getElementById('fNote').value.trim(),
  };
  const btn = document.getElementById('btnSave');
  btn.textContent = '...'; btn.disabled = true;
  try {
    await apiPost(data);
    closeModal();
    await loadData();
  } catch (e) {
    alert('Errore: ' + e.message);
  } finally {
    btn.textContent = 'Salva'; btn.disabled = false;
  }
}
async function deleteContact() {
  const id = Number(document.getElementById('fId').value);
  try {
    await apiPost({ action: 'delete', id });
    closeModal();
    await loadData();
  } catch (e) {
    alert('Errore: ' + e.message);
  }
}

init();
</script>
</body>
</html>
