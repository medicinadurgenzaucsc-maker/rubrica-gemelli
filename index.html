<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Rubrica Gemelli</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0c0c0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rubrica">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="app.css">
</head>
<body>

<header>
  <div class="inner">
    <div class="header-top">
      <div class="header-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;margin-right:.4rem"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.3 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Rubrica Gemelli
      </div>
      <div class="header-count" id="countLabel" aria-live="polite"></div>
      <button class="btn-icon" id="btnSettings" title="Gestione categorie" aria-label="Gestione categorie">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="btn-icon" id="btnTheme" title="Cambia tema" aria-label="Cambia tema">◐</button>
      <button class="btn-icon" id="btnInstall" title="Aggiungi a preferiti / Home" aria-label="Installa app">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    </div>
    <div class="search-wrap" id="searchWrap">
      <input type="search" id="searchBar" placeholder="Cerca nome o numero..." autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Cerca">
      <button type="button" class="btn-search-clear" id="btnSearchClear" aria-label="Pulisci ricerca">×</button>
    </div>
    <div id="searchSuggestions" hidden></div>
    <div class="btn-row">
      <button id="btnAll" class="active" type="button">Mostra Tutti</button>
      <button id="btnAlpha" type="button">A – Z</button>
      <button id="btnNew" type="button">Nuovo Contatto</button>
    </div>
    <div id="chips"></div>
  </div>
</header>

<main>
  <div class="inner" id="contactList">
    <div class="state-msg">
      <div class="spinner"></div>
      <div>Caricamento rubrica...</div>
    </div>
  </div>
</main>

<div id="installToast" role="status" aria-live="polite"></div>

<!-- Menu long-press numero -->
<div id="numMenuOverlay" hidden role="dialog" aria-modal="true" aria-label="Azioni numero">
  <div class="num-menu-box">
    <div class="num-menu-title" id="numMenuTitle"></div>
    <div class="num-menu-sub" id="numMenuSub"></div>
    <button type="button" class="num-menu-action" data-action="call">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.3 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Chiama
    </button>
    <button type="button" class="num-menu-action" data-action="copy">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copia numero
    </button>
    <button type="button" class="num-menu-action" data-action="copy-full">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Copia con nome
    </button>
    <button type="button" class="num-menu-action" data-action="share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Condividi
    </button>
    <button type="button" class="num-menu-action danger" data-action="close">
      Annulla
    </button>
  </div>
</div>

<!-- Modal Filtro Alfabetico -->
<div id="alphaModalOverlay" hidden role="dialog" aria-modal="true" aria-label="Filtra per iniziale">
  <div id="alphaModalBox">
    <div class="modal-title">Filtra per iniziale</div>
    <div class="alpha-grid" id="alphaGrid"></div>
    <button type="button" id="btnAlphaClose" class="btn-cancel" style="width:100%;margin-top:.9rem">Chiudi</button>
  </div>
</div>

<!-- Modal Gestione Categorie -->
<div id="catModalOverlay" hidden role="dialog" aria-modal="true" aria-label="Gestione categorie">
  <div id="catModalBox">
    <div class="modal-title">Gestione Categorie</div>
    <div id="catList"></div>
    <div class="form-group" style="margin-top:.9rem">
      <label for="fNewCat">Nuova categoria</label>
      <div class="cat-add-row">
        <input type="text" id="fNewCat" placeholder="es. CHIRURGIA" autocomplete="off" spellcheck="false">
        <button type="button" id="btnAddCat" class="btn-add-cat">Aggiungi</button>
      </div>
    </div>
    <div class="modal-btns">
      <button type="button" class="btn-cancel" id="btnCatCancel">Chiudi</button>
      <button type="button" class="btn-primary" id="btnCatSave">Salva modifiche</button>
    </div>
  </div>
</div>

<!-- Modal Contatto -->
<div id="modalOverlay" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div id="modalBox">
    <div class="modal-title" id="modalTitle">Nuovo Contatto</div>
    <form id="contactForm" novalidate>
      <input type="hidden" id="fId">
      <div class="form-group">
        <label for="fNome">Nome *</label>
        <input type="text" id="fNome" required placeholder="es. Cardiologia guardia">
      </div>
      <div class="form-group">
        <label for="fCategoria">Categoria *</label>
        <select id="fCategoria" required></select>
      </div>
      <div class="form-group">
        <label>Numeri e note</label>
        <div id="numeriContainer"></div>
        <button type="button" id="btnAddNum" class="btn-add-num">+ Aggiungi numero</button>
      </div>
      <div class="modal-btns">
        <button type="button" class="btn-cancel" id="btnCancel">Annulla</button>
        <button type="button" class="btn-danger" id="btnDelete" hidden>Elimina</button>
        <button type="submit" class="btn-primary" id="btnSave">Salva</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
