<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Rubrica Gemelli</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rubrica">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f7f7f7;
      --text:     #111111;
      --muted:    #888888;
      --border:   #e5e5e5;
      --accent:   #0891b2;
      --num:      #0891b2;
      --num-bg:   #e0f7fa;
      --note:     #555555;
      --modal-bg: #ffffff;
    }
    [data-theme="dark"] {
      --bg:       #0c0c0c;
      --surface:  #161616;
      --text:     #ececec;
      --muted:    #666666;
      --border:   #222222;
      --accent:   #20b8cd;
      --num:      #20b8cd;
      --num-bg:   rgba(32,184,205,.12);
      --note:     #aaaaaa;
      --modal-bg: #111111;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 3rem;
      transition: background .2s, color .2s;
      font-size: 17px;
    }

    .inner {
      width: 90%;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      padding: 1rem 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .9rem;
    }
    .header-title {
      color: var(--accent);
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .02em;
      flex: 1;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .header-count {
      color: var(--muted);
      font-size: .75rem;
    }
    .btn-theme {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: .85rem;
      width: 1.9rem;
      height: 1.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .btn-theme:hover { border-color: var(--accent); color: var(--accent); }
    .btn-install {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 1.9rem;
      height: 1.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .btn-install:hover  { border-color: var(--accent); color: var(--accent); }
    .btn-install.ready  { color: var(--accent); border-color: var(--accent); }
    .btn-install.done   { color: #f59e0b; border-color: #f59e0b; }

    /* Toast */
    #installToast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.92);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .84rem;
      padding: .7rem 1.15rem;
      border-radius: 9px;
      white-space: normal;
      max-width: 88vw;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      z-index: 500;
    }
    #installToast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #installToast.toast-error   { border-color: #ef4444; background: rgba(239,68,68,.15); }
    #installToast.toast-warning { border-color: #f59e0b; background: rgba(245,158,11,.13); }
    #installToast.toast-success { border-color: #22c55e; background: rgba(34,197,94,.13);  }
    #installToast.toast-confirm { pointer-events: auto; min-width: 220px; }

    #searchBar {
      width: 100%;
      padding: .7rem 1.1rem;
      font-size: .95rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      transition: border-color .15s, background .2s;
      font-family: inherit;
    }
    #searchBar::placeholder { color: var(--muted); }
    #searchBar:focus { border-color: var(--accent); }

    .btn-row {
      display: flex;
      gap: .5rem;
      margin-top: .7rem;
    }
    .btn-row button {
      flex: 1;
      padding: .5rem;
      font-size: .8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
      font-family: inherit;
      letter-spacing: .01em;
    }
    .btn-row button:hover { border-color: var(--accent); color: var(--accent); }
    .btn-row button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #chips {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      padding: .65rem 0 .55rem;
    }
    .chip {
      padding: .22rem .65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .12s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Card contatti ── */
    main { padding: .75rem 0; }

    .contact-card {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem .9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: .4rem;
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-weight: 500;
      font-size: .9rem;
      color: var(--text);
      margin-bottom: .3rem;
      line-height: 1.3;
    }
    .contact-numbers { display: flex; flex-wrap: wrap; gap: .35rem .5rem; align-items: center; }
    .num-group { display: inline-flex; align-items: center; gap: .3rem; }
    .num-pill {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: .78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--num-bg);
      text-decoration: none;
      letter-spacing: .03em;
      padding: .18rem .55rem;
      border-radius: 999px;
      transition: opacity .1s;
      white-space: nowrap;
    }
    .num-pill:active { opacity: .6; }
    .num-nota-inline {
      font-size: .72rem;
      color: var(--note);
      white-space: nowrap;
    }

    /* ── Modal: righe numero+nota dinamiche ── */
    .num-row {
      display: flex;
      gap: .4rem;
      align-items: center;
      margin-bottom: .4rem;
    }
    .num-row-inputs {
      display: flex;
      gap: .4rem;
      flex: 1;
    }
    .num-row-inputs .f-num {
      width: 7rem;
      flex-shrink: 0;
      padding: .6rem .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .88rem;
      color: var(--text);
      background: var(--surface);
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-weight: 600;
      outline: none;
      transition: border-color .15s;
    }
    .num-row-inputs .f-num:focus { border-color: var(--accent); }
    .num-row-inputs .f-num.invalid { border-color: #ef4444; }
    .num-row-inputs .f-nota {
      flex: 1;
      padding: .6rem .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .88rem;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .num-row-inputs .f-nota:focus { border-color: var(--accent); }
    .btn-rm-num {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: .85rem;
      width: 1.8rem;
      height: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }
    .btn-rm-num:hover { border-color: #ef4444; color: #ef4444; }
    .btn-add-num {
      margin-top: .2rem;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: .82rem;
      padding: .45rem .75rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      font-family: inherit;
      transition: border-color .12s, color .12s;
    }
    .btn-add-num:hover { border-color: var(--accent); color: var(--accent); }
    .contact-cat { display: none; }

    .btn-edit {
      background: none;
      border: none;
      padding: .25rem;
      cursor: pointer;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      opacity: .45;
      transition: opacity .12s;
    }
    .btn-edit:hover { opacity: 1; color: var(--accent); }

    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: .88rem;
    }
    .state-msg .ico { margin-bottom: .5rem; }
    .state-msg .sub { font-size: .8rem; margin-top: .35rem; opacity: .6; }
    .spinner {
      width: 22px; height: 22px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #modalOverlay[hidden] { display: none; }
    #modalBox {
      background: var(--modal-bg);
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-width: 760px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      transition: background .2s;
    }
    .modal-title {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .form-group { margin-bottom: .8rem; }
    .form-group label {
      display: block;
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: .25rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .9rem;
      color: var(--text);
      outline: none;
      background: var(--surface);
      font-family: inherit;
      transition: border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: .5rem; margin-top: 1.1rem; }
    .btn-primary {
      flex: 1;
      padding: .65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:active { opacity: .85; }
    .btn-danger {
      padding: .65rem .9rem;
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:active { opacity: .75; }
    .btn-cancel {
      padding: .65rem .9rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Btn Settings ── */
    .btn-settings {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 1.9rem;
      height: 1.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .btn-settings:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Modal Categorie ── */
    #catModalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #catModalOverlay[hidden] { display: none; }
    #catModalBox {
      background: var(--modal-bg);
      border-top: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      width: 100%;
      max-width: 760px;
      max-height: 88vh;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 1rem;
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      transition: background .2s;
    }

    /* Righe categoria */
    .cat-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .35rem 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-item:last-child { border-bottom: none; }
    .cat-name-input {
      flex: 1;
      padding: .45rem .6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .86rem;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .cat-name-input:focus { border-color: var(--accent); }
    .cat-count {
      font-size: .72rem;
      color: var(--muted);
      min-width: 3.4rem;
      text-align: right;
      white-space: nowrap;
    }
    .cat-del-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      width: 1.8rem;
      height: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      transition: all .12s;
    }
    .cat-del-btn.can-del { color: #ef4444; border-color: rgba(239,68,68,.3); }
    .cat-del-btn.can-del:hover { background: rgba(239,68,68,.12); border-color: #ef4444; }
    .cat-del-btn.no-del  { color: #ef4444; opacity: .25; cursor: default; }

    /* Riga aggiungi nuova categoria */
    .cat-add-row {
      display: flex;
      gap: .4rem;
      margin-top: .3rem;
    }
    .cat-add-row input {
      flex: 1;
      padding: .6rem .8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .9rem;
      color: var(--text);
      background: var(--surface);
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .cat-add-row input:focus { border-color: var(--accent); }
    .cat-add-row .btn-add-cat {
      padding: .55rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .cat-add-row .btn-add-cat:active { opacity: .85; }

    /* ── Modal Filtro Alfabetico ── */
    #alphaModalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #alphaModalOverlay[hidden] { display: none; }
    #alphaModalBox {
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: min(96vw, 480px);
      padding: 1.3rem 1.1rem 1.5rem;
      transition: background .2s;
    }
    .alpha-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: .42rem;
      margin-top: .85rem;
    }
    .alpha-btn {
      min-height: 48px;
      padding: .5rem .1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .alpha-btn:hover { border-color: var(--accent); color: var(--accent); }
    .alpha-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .alpha-btn.num-btn {
      grid-column: span 2;
      font-size: .78rem;
      letter-spacing: -.01em;
    }

    /* Spinner dentro i bottoni */
    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      opacity: .85;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <div class="header-top">
      <div class="header-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:.4rem"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.3 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Rubrica Gemelli</div>
      <div class="header-count" id="countLabel"></div>
      <button class="btn-settings" id="btnSettings" title="Gestione categorie" aria-label="Gestione categorie">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="btn-theme" id="btnTheme" title="Cambia tema" aria-label="Cambia tema">◐</button>
      <button class="btn-install" id="btnInstall" title="Aggiungi a preferiti / Home" aria-label="Installa app">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    </div>
    <input type="search" id="searchBar" placeholder="Cerca nome o numero..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <div class="btn-row">
      <button id="btnAll" class="active">Mostra Tutti</button>
      <button id="btnAlpha">A – Z</button>
      <button id="btnNew">Nuovo Contatto</button>
    </div>
    <div id="chips"></div>
  </div>
</header>

<main>
  <div class="inner" id="contactList">
    <div class="state-msg">
      <div class="spinner"></div>
      <div>Caricamento rubrica...</div>
    </div>
  </div>
</main>

<div id="installToast"></div>

<!-- Modal Filtro Alfabetico -->
<div id="alphaModalOverlay" hidden>
  <div id="alphaModalBox">
    <div class="modal-title">Filtra per iniziale</div>
    <div class="alpha-grid" id="alphaGrid"></div>
    <button type="button" id="btnAlphaClose" class="btn-cancel" style="width:100%;margin-top:.9rem">Chiudi</button>
  </div>
</div>

<!-- Modal Gestione Categorie -->
<div id="catModalOverlay" hidden>
  <div id="catModalBox">
    <div class="modal-title">Gestione Categorie</div>
    <div id="catList"></div>
    <div class="form-group" style="margin-top:.9rem">
      <label>Nuova categoria</label>
      <div class="cat-add-row">
        <input type="text" id="fNewCat" placeholder="es. CHIRURGIA" autocomplete="off" spellcheck="false">
        <button type="button" id="btnAddCat" class="btn-add-cat">Aggiungi</button>
      </div>
    </div>
    <div class="modal-btns">
      <button type="button" class="btn-cancel" id="btnCatCancel">Chiudi</button>
      <button type="button" class="btn-primary" id="btnCatSave">Salva modifiche</button>
    </div>
  </div>
</div>

<div id="modalOverlay" hidden>
  <div id="modalBox">
    <div class="modal-title" id="modalTitle">Nuovo Contatto</div>
    <form id="contactForm" novalidate>
      <input type="hidden" id="fId">
      <div class="form-group">
        <label>Nome *</label>
        <input type="text" id="fNome" required placeholder="es. Cardiologia guardia">
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="fCategoria" required></select>
      </div>
      <div class="form-group">
        <label>Numeri e note</label>
        <div id="numeriContainer"></div>
        <button type="button" id="btnAddNum" class="btn-add-num">+ Aggiungi numero</button>
      </div>
      <div class="modal-btns">
        <button type="button" class="btn-cancel" id="btnCancel">Annulla</button>
        <button type="button" class="btn-danger" id="btnDelete" hidden>Elimina</button>
        <button type="submit" class="btn-primary" id="btnSave">Salva</button>
      </div>
    </form>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCBaTVHVLRviELi21kH8FcPlsqrSxpIY-ZsYMbbQ-fQbpX7UcFLUx4yaqTse5ETxAc/exec';

let allContacts = [];
let categories  = [];
let activeCategory = null;
let activeSearch   = '';
let activeAlpha    = null;

// ── Tema ──────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('btnTheme').textContent = '◐';
  localStorage.setItem('rubrica-theme', theme);
}
(function initTheme() {
  const saved = localStorage.getItem('rubrica-theme') || 'dark';
  applyTheme(saved);
})();
document.getElementById('btnTheme').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  setupEvents();
  await loadData();
}

async function loadData() {
  try {
    showLoading();
    const [contacts, cats] = await Promise.all([
      apiFetch('getAll'),
      apiFetch('getCategorie'),
    ]);
    allContacts = contacts;
    categories  = cats;
    renderChips();
    renderContacts(allContacts);
  } catch (e) {
    showError(e.message);
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(action, params = {}) {
  const qs  = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}
async function apiPost(body) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chips');
  const sorted = [...categories].sort((a, b) => a.nome.localeCompare(b.nome, 'it'));
  el.innerHTML = sorted.map(c =>
    `<button class="chip${activeCategory === c.nome ? ' active' : ''}" data-cat="${esc(c.nome)}">${esc(c.nome)}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      activeCategory = activeCategory === cat ? null : cat;
      el.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
      document.getElementById('btnAll').classList.toggle('active', !activeCategory);
      applyFilters();
    });
  });
}

function applyFilters() {
  let result = allContacts;
  if (activeCategory) result = result.filter(c => c.categoria === activeCategory);
  if (activeAlpha) {
    if (activeAlpha === '0-9') {
      result = result.filter(c => /^\d/.test(String(c.nome || '')));
    } else {
      result = result.filter(c => String(c.nome || '').toUpperCase().startsWith(activeAlpha));
    }
    result = [...result].sort((a, b) => String(a.nome).localeCompare(String(b.nome), 'it'));
  }
  if (activeSearch) result = smartSearch(result, activeSearch);
  renderContacts(result);
}

// ── Ricerca smart a 3 tier ────────────────────────────────────────────────────
function smartSearch(contacts, rawQuery) {
  const q = rawQuery.toLowerCase().trim();
  if (!q) return contacts;

  const tokens  = q.split(/\s+/).filter(Boolean);
  const escRe   = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const haystack = c => [c.nome, c.numeri, c.note]
    .map(s => String(s || '')).join(' ').toLowerCase();

  // Tier 3 attivo solo se la query ha >= 4 caratteri
  const doTier3 = q.length >= 4;

  const tier1 = [], tier2 = [], tier3 = [];

  for (const c of contacts) {
    const h = haystack(c);

    // Tier 1 — frase esatta (sottostringa contigua)
    if (h.includes(q)) {
      tier1.push(c);

    // Tier 2 — tutte le parole presenti come parole intere (ordine qualsiasi)
    } else if (tokens.every(t => new RegExp('\\b' + escRe(t) + '\\b').test(h))) {
      tier2.push(c);

    // Tier 3 — sottostringa all'interno di altre parole (query >= 4 chars)
    } else if (doTier3 && tokens.every(t => h.includes(t))) {
      tier3.push(c);
    }
  }

  return [...tier1, ...tier2, ...tier3];
}

function renderContacts(contacts) {
  const el = document.getElementById('contactList');
  updateCount(contacts.length);
  if (!contacts.length) {
    el.innerHTML = '<div class="state-msg"><div class="ico">∅</div><div>Nessun risultato</div></div>';
    return;
  }
  el.innerHTML = contacts.map(c => {
    const nums  = String(c.numeri || '').split('|').map(n => n.trim()).filter(Boolean);
    const notes = String(c.note   || '').split('|');
    const groups = nums.map((n, i) => {
      const nota = (notes[i] || '').trim();
      return `<span class="num-group"><a class="num-pill" href="tel:${n}">${n}</a>${nota ? `<span class="num-nota-inline">${esc(nota)}</span>` : ''}</span>`;
    }).join('');
    return `
      <div class="contact-card">
        <div class="contact-info">
          <div class="contact-name">${esc(String(c.nome))}</div>
          <div class="contact-numbers">${groups}</div>
          <div class="contact-cat">${esc(String(c.categoria))}</div>
        </div>
        <button class="btn-edit" data-id="${c.id}" aria-label="Modifica"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      </div>`;
  }).join('');
  el.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEdit(btn.dataset.id));
  });
}

function showLoading() {
  document.getElementById('contactList').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><div>Caricamento...</div></div>';
  updateCount(null);
}
function showError(msg) {
  document.getElementById('contactList').innerHTML =
    `<div class="state-msg"><div class="ico">×</div><div>${esc(msg)}</div><div class="sub">Controlla la connessione e riprova</div></div>`;
  updateCount(null);
}
function updateCount(n) {
  document.getElementById('countLabel').textContent = n !== null ? `${n} contatti` : '';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ────────────────────────────────────────────────────────────────────
function setupEvents() {
  document.getElementById('searchBar').addEventListener('input', e => {
    activeSearch = e.target.value.toLowerCase().trim();
    applyFilters();
  });
  document.getElementById('btnAll').addEventListener('click', () => {
    activeCategory = null;
    activeSearch   = '';
    activeAlpha    = null;
    document.getElementById('searchBar').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('btnAll').classList.add('active');
    document.getElementById('btnAlpha').classList.remove('active');
    renderContacts(allContacts);
  });
  document.getElementById('btnAlpha').addEventListener('click', openAlphaModal);
  document.getElementById('btnAlphaClose').addEventListener('click', () => {
    document.getElementById('alphaModalOverlay').hidden = true;
  });
  document.getElementById('alphaModalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('alphaModalOverlay'))
      document.getElementById('alphaModalOverlay').hidden = true;
  });
  document.getElementById('btnNew').addEventListener('click', () => openModal(null));
  document.getElementById('btnAddNum').addEventListener('click', () => { const f = addNumRow(); f.focus(); });
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // Categorie
  document.getElementById('btnSettings').addEventListener('click', openCatModal);
  document.getElementById('btnCatCancel').addEventListener('click', closeCatModal);
  document.getElementById('catModalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('catModalOverlay')) closeCatModal();
  });
  document.getElementById('btnAddCat').addEventListener('click', addNewCategory);
  document.getElementById('fNewCat').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addNewCategory(); }
  });
  document.getElementById('btnCatSave').addEventListener('click', saveCatChanges);
  document.getElementById('contactForm').addEventListener('submit', async e => {
    e.preventDefault();
    await saveContact();
  });
  document.getElementById('btnDelete').addEventListener('click', async () => {
    if (await showConfirm('Eliminare questo contatto?', 'error')) await deleteContact();
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function addNumRow(num = '', nota = '') {
  const container = document.getElementById('numeriContainer');
  const row = document.createElement('div');
  row.className = 'num-row';
  row.innerHTML = `
    <div class="num-row-inputs">
      <input type="tel" class="f-num" placeholder="Numero" value="${esc(num)}" inputmode="numeric" autocomplete="off">
      <input type="text" class="f-nota" placeholder="Nota (opzionale)" value="${esc(nota)}" autocomplete="off">
    </div>
    <button type="button" class="btn-rm-num" aria-label="Rimuovi riga">×</button>`;

  // Validazione numero: solo cifre, in tempo reale
  const fNum = row.querySelector('.f-num');
  fNum.addEventListener('input', () => {
    fNum.value = fNum.value.replace(/[^\d]/g, '');
    fNum.classList.toggle('invalid', fNum.value.length > 0 && !/^\d+$/.test(fNum.value));
  });
  fNum.addEventListener('blur', () => {
    fNum.classList.toggle('invalid', fNum.value.length > 0 && !/^\d+$/.test(fNum.value));
  });

  // Validazione nota: impedisce il carattere separatore |
  const fNota = row.querySelector('.f-nota');
  fNota.addEventListener('input', () => {
    if (fNota.value.includes('|')) fNota.value = fNota.value.replace(/\|/g, '');
  });

  // Rimuovi riga (non rimuovere se è l'unica)
  row.querySelector('.btn-rm-num').addEventListener('click', () => {
    if (document.querySelectorAll('.num-row').length > 1) row.remove();
  });

  container.appendChild(row);
  return fNum;
}

function collectPairs() {
  const rows = document.querySelectorAll('.num-row');
  const numeri = [], note = [];
  let valid = true;
  rows.forEach(row => {
    const n = row.querySelector('.f-num').value.trim();
    const t = row.querySelector('.f-nota').value.trim();
    if (!n) return; // riga vuota ignorata
    if (!/^\d+$/.test(n)) {
      row.querySelector('.f-num').classList.add('invalid');
      valid = false;
    } else {
      numeri.push(n);
      note.push(t);
    }
  });
  if (!valid) return null;
  return { numeri: numeri.join('|'), note: note.join('|') };
}

function openModal(contact) {
  const isNew = !contact;
  document.getElementById('modalTitle').textContent = isNew ? 'Nuovo Contatto' : 'Modifica Contatto';
  document.getElementById('fId').value   = contact?.id ?? '';
  document.getElementById('fNome').value = contact?.nome ?? '';
  document.getElementById('btnDelete').hidden = isNew;
  document.getElementById('fCategoria').innerHTML = categories.map(c =>
    `<option value="${esc(c.nome)}"${c.nome === contact?.categoria ? ' selected' : ''}>${esc(c.nome)}</option>`
  ).join('');

  // Popola righe numero+nota
  document.getElementById('numeriContainer').innerHTML = '';
  const nums  = String(contact?.numeri || '').split('|').map(s => s.trim()).filter(Boolean);
  const notes = String(contact?.note   || '').split('|');
  if (nums.length) {
    nums.forEach((n, i) => addNumRow(n, notes[i] || ''));
  } else {
    addNumRow(); // riga vuota per nuovo contatto
  }

  document.getElementById('modalOverlay').hidden = false;
  setTimeout(() => document.getElementById('fNome').focus(), 50);
}
function openEdit(id) {
  const c = allContacts.find(x => String(x.id) === String(id));
  if (c) openModal(c);
}
function closeModal() { document.getElementById('modalOverlay').hidden = true; }

async function saveContact() {
  const id   = document.getElementById('fId').value;
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { showToast('Il nome è obbligatorio', 3000, 'warning'); return; }

  const pairs = collectPairs();
  if (!pairs) { showToast('Uno o più numeri contengono caratteri non validi (solo cifre)', 3500, 'warning'); return; }
  if (!pairs.numeri) { showToast('Inserisci almeno un numero', 3000, 'warning'); return; }

  const data = {
    action:    id ? 'update' : 'add',
    ...(id && { id: Number(id) }),
    nome,
    categoria: document.getElementById('fCategoria').value,
    numeri:    pairs.numeri,
    note:      pairs.note,
  };
  const btn = document.getElementById('btnSave');
  btn.innerHTML = '<span class="btn-spinner"></span>'; btn.disabled = true;
  try {
    await apiPost(data);
    closeModal();
    await loadData();
  } catch (e) {
    showToast('Errore: ' + e.message, 4000, 'error');
  } finally {
    btn.textContent = 'Salva'; btn.disabled = false;
  }
}
async function deleteContact() {
  const id  = Number(document.getElementById('fId').value);
  const btn = document.getElementById('btnDelete');
  btn.innerHTML = '<span class="btn-spinner"></span>'; btn.disabled = true;
  try {
    await apiPost({ action: 'delete', id });
    closeModal();
    showToast('Contatto eliminato con successo', 3000, 'success');
    await loadData();
  } catch (e) {
    showToast('Errore eliminazione: ' + e.message, 4000, 'error');
  } finally {
    btn.textContent = 'Elimina'; btn.disabled = false;
  }
}

// ── Filtro Alfabetico ─────────────────────────────────────────────────────────
const ALPHA_KEYS = ['0-9', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];

function openAlphaModal() {
  const grid = document.getElementById('alphaGrid');
  grid.innerHTML = ALPHA_KEYS.map(k =>
    `<button class="alpha-btn${k === '0-9' ? ' num-btn' : ''}${activeAlpha === k ? ' active' : ''}"
             data-key="${k}" type="button">${k}</button>`
  ).join('');
  grid.querySelectorAll('.alpha-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      const overlay = document.getElementById('alphaModalOverlay');
      const btnAlpha = document.getElementById('btnAlpha');
      const btnAll   = document.getElementById('btnAll');
      if (activeAlpha === key) {
        // Secondo click sulla stessa lettera → deseleziona
        activeAlpha = null;
        btnAlpha.classList.remove('active');
        btnAll.classList.add('active');
      } else {
        activeAlpha = key;
        btnAlpha.classList.add('active');
        btnAll.classList.remove('active');
      }
      overlay.hidden = true;
      applyFilters();
    });
  });
  document.getElementById('alphaModalOverlay').hidden = false;
}

// ── Categorie Modal ───────────────────────────────────────────────────────────
let catOriginal   = [];  // [{id, nome, ordine, count}] dal server
let catPending    = [];  // [{id, nome, editNome, ordine, count, deleted}]
let catPendingNew = [];  // [{nome}] da aggiungere

function formatCatName(s) {
  // Mantiene lettere (anche accentate), cifre, spazi, trattini, underscore, punti
  return s.replace(/[^a-zA-ZÀ-ÿ0-9 \-_.]/g, '').toUpperCase().trim();
}

async function openCatModal() {
  document.getElementById('catModalOverlay').hidden = false;
  document.getElementById('catList').innerHTML =
    '<div style="text-align:center;padding:1.5rem 1rem"><div class="spinner"></div></div>';
  try {
    catOriginal   = await apiFetch('getCategorieConCount');
    catPending    = catOriginal.map(c => ({ ...c, editNome: c.nome, deleted: false }));
    catPendingNew = [];
    renderCatList();
  } catch (e) {
    document.getElementById('catModalOverlay').hidden = true;
    showToast('Errore caricamento categorie: ' + e.message, 4000, 'error');
  }
}

async function closeCatModal() {
  if (hasCatChanges() && !(await showConfirm('Ci sono modifiche non salvate.\nChiudere ugualmente?', 'warning'))) return;
  document.getElementById('catModalOverlay').hidden = true;
}

function hasCatChanges() {
  return catPending.some(c => c.deleted || c.editNome !== c.nome) || catPendingNew.length > 0;
}

const TRASH_SVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

function renderCatList() {
  const el = document.getElementById('catList');

  const existingHTML = catPending
    .filter(c => !c.deleted)
    .map(c => {
      const pidx = catPending.indexOf(c);
      const canDel = c.count === 0;
      return `
        <div class="cat-item">
          <input class="cat-name-input" type="text" value="${esc(c.editNome)}"
                 data-pidx="${pidx}" autocomplete="off" spellcheck="false">
          <span class="cat-count">${c.count > 0 ? c.count + ' cont.' : '—'}</span>
          <button class="cat-del-btn ${canDel ? 'can-del' : 'no-del'}"
                  data-pidx="${pidx}" data-type="existing" type="button"
                  title="${canDel ? 'Elimina' : 'Ha contatti — elimina prima i contatti'}">${TRASH_SVG}</button>
        </div>`;
    }).join('');

  const newHTML = catPendingNew.map((nc, ni) => `
    <div class="cat-item">
      <input class="cat-name-input" type="text" value="${esc(nc.nome)}"
             data-nidx="${ni}" autocomplete="off" spellcheck="false">
      <span class="cat-count" style="color:var(--accent);font-style:italic">nuovo</span>
      <button class="cat-del-btn can-del" data-nidx="${ni}" data-type="new"
              type="button" title="Rimuovi">${TRASH_SVG}</button>
    </div>`).join('');

  el.innerHTML = existingHTML + newHTML;

  // Input esistenti: aggiorna editNome, formatta on blur
  el.querySelectorAll('.cat-name-input[data-pidx]').forEach(input => {
    const idx = Number(input.dataset.pidx);
    input.addEventListener('input', () => { catPending[idx].editNome = input.value; });
    input.addEventListener('blur', () => {
      const f = formatCatName(input.value) || catPending[idx].nome;
      input.value = f;
      catPending[idx].editNome = f;
    });
  });

  // Input nuovi: aggiorna nome, formatta on blur
  el.querySelectorAll('.cat-name-input[data-nidx]').forEach(input => {
    const ni = Number(input.dataset.nidx);
    input.addEventListener('input', () => { catPendingNew[ni].nome = input.value; });
    input.addEventListener('blur', () => {
      const f = formatCatName(input.value) || catPendingNew[ni].nome;
      input.value = f;
      catPendingNew[ni].nome = f;
    });
  });

  // Bottoni cestino
  el.querySelectorAll('.cat-del-btn').forEach(btn => {
    if (btn.classList.contains('no-del')) {
      btn.addEventListener('click', () => {
        const c = catPending[Number(btn.dataset.pidx)];
        showToast(`"${c.nome}" ha ${c.count} contatti — non può essere eliminata`, 4000, 'warning');
      });
      return;
    }
    btn.addEventListener('click', () => {
      if (btn.dataset.type === 'existing') {
        catPending[Number(btn.dataset.pidx)].deleted = true;
      } else {
        catPendingNew.splice(Number(btn.dataset.nidx), 1);
      }
      renderCatList();
    });
  });
}

function addNewCategory() {
  const input = document.getElementById('fNewCat');
  const nome = formatCatName(input.value);
  if (!nome) { showToast('Nome categoria non valido', 3000, 'warning'); return; }

  const allNames = [
    ...catPending.filter(c => !c.deleted).map(c => c.editNome.toLowerCase()),
    ...catPendingNew.map(c => c.nome.toLowerCase())
  ];
  if (allNames.includes(nome.toLowerCase())) {
    showToast('Categoria già esistente: ' + nome, 3000, 'warning'); return;
  }
  catPendingNew.push({ nome });
  input.value = '';
  renderCatList();
  input.focus();
}

async function saveCatChanges() {
  // Nomi finali (dopo format)
  const finalNames = [
    ...catPending.filter(c => !c.deleted).map(c => formatCatName(c.editNome)),
    ...catPendingNew.map(c => formatCatName(c.nome))
  ];
  if (finalNames.some(n => !n)) {
    showToast('Il nome di una categoria è vuoto o non valido', 3000, 'warning'); return;
  }
  const lower = finalNames.map(n => n.toLowerCase());
  if (lower.some((n, i) => lower.indexOf(n) !== i)) {
    showToast('Ci sono categorie con lo stesso nome', 3000, 'warning'); return;
  }

  // Avviso rinomina con contatti
  const renames = catPending.filter(c => !c.deleted && c.editNome !== c.nome);
  const renamesWithCont = renames.filter(c => c.count > 0);
  if (renamesWithCont.length) {
    const msg = renamesWithCont.map(c =>
      `• "${c.nome}" → "${c.editNome}" (${c.count} contatti verranno aggiornati)`
    ).join('\n');
    if (!(await showConfirm(`Attenzione — verranno aggiornati i contatti:\n\n${msg}\n\nProcedere?`, 'warning'))) return;
  }

  const btn = document.getElementById('btnCatSave');
  btn.innerHTML = '<span class="btn-spinner"></span>'; btn.disabled = true;
  try {
    for (const nc of catPendingNew) {
      const r = await apiPost({ action: 'addCategoria', nome: formatCatName(nc.nome) });
      if (r.error) throw new Error(r.error);
    }
    for (const c of renames) {
      const r = await apiPost({ action: 'rinominaCategoria', oldNome: c.nome, newNome: formatCatName(c.editNome) });
      if (r.error) throw new Error(r.error);
    }
    for (const c of catPending.filter(c => c.deleted)) {
      const r = await apiPost({ action: 'eliminaCategoria', nome: c.nome });
      if (r.error) throw new Error(r.error);
    }
    document.getElementById('catModalOverlay').hidden = true;
    showToast('Categorie aggiornate con successo', 3000, 'success');
    await loadData();
  } catch (e) {
    showToast('Errore: ' + e.message, 5000, 'error');
  } finally {
    btn.textContent = 'Salva modifiche'; btn.disabled = false;
  }
}

init();

// ── Installa / Preferiti ──────────────────────────────────────────────────────
let installPrompt = null;
const btnInstall  = document.getElementById('btnInstall');
const isIOS       = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone;

// Cattura il prompt PWA (Android + Chrome/Edge desktop)
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPrompt = e;
  btnInstall.classList.add('ready');
  btnInstall.title = 'Installa app';
});

// Installazione completata
window.addEventListener('appinstalled', () => {
  installPrompt = null;
  setStarDone();
});

function setStarDone() {
  btnInstall.classList.remove('ready');
  btnInstall.classList.add('done');
  btnInstall.querySelector('svg').setAttribute('fill', 'currentColor');
}

function showToast(msg, duration = 3500, type = '') {
  const t = document.getElementById('installToast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' toast-' + type : '');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => { t.classList.remove('show'); }, duration);
}

function showConfirm(msg, type = 'warning') {
  return new Promise(resolve => {
    const t = document.getElementById('installToast');
    clearTimeout(t._hideTimer);
    t.innerHTML = `
      <div style="line-height:1.45;margin-bottom:.6rem">${esc(msg).replace(/\n/g,'<br>')}</div>
      <div style="display:flex;gap:.5rem;justify-content:center">
        <button class="tc-no"  style="padding:.32rem .9rem;border:1px solid rgba(128,128,128,.45);border-radius:5px;background:transparent;color:inherit;font-family:inherit;font-size:.82rem;cursor:pointer">Annulla</button>
        <button class="tc-yes" style="padding:.32rem .9rem;border:none;border-radius:5px;background:var(--accent);color:#fff;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer">Conferma</button>
      </div>`;
    t.className = 'show toast-confirm' + (type ? ' toast-' + type : '');
    const done = ok => { t.classList.remove('show'); resolve(ok); };
    t.querySelector('.tc-yes').addEventListener('click', () => done(true),  { once: true });
    t.querySelector('.tc-no').addEventListener('click',  () => done(false), { once: true });
  });
}

btnInstall.addEventListener('click', async () => {
  if (isInStandalone) {
    showToast('App già installata sulla schermata Home');
    return;
  }
  if (installPrompt) {
    // Prompt nativo PWA (Android / Chrome / Edge desktop)
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    if (outcome === 'accepted') { installPrompt = null; setStarDone(); }
  } else if (isIOS) {
    // iOS Safari — istruzioni manuali
    showToast('Safari: tocca  →  "Aggiungi a schermata Home"', 5000);
  } else {
    // Desktop senza prompt PWA (Firefox, Safari desktop…)
    showToast('Premi Ctrl+D per aggiungere ai preferiti del browser');
  }
});

// Se già installata, mostra stella piena
if (isInStandalone) setStarDone();
</script>
