name: Supabase Keepalive

on:
  schedule:
    - cron: '0 7 */3 * *'   # ogni 3 giorni alle 07:00 UTC
  workflow_dispatch:          # eseguibile anche a mano dalla tab Actions

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iYmVreHV2dWFyeGt1dnZ2Z2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NzU4NTksImV4cCI6MjA5MzI1MTg1OX0.KPYvlg1bken6Oux0XltZL-Ld0mwyXeS7oek4uZaQDW0" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iYmVreHV2dWFyeGt1dnZ2Z2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NzU4NTksImV4cCI6MjA5MzI1MTg1OX0.KPYvlg1bken6Oux0XltZL-Ld0mwyXeS7oek4uZaQDW0" \
            "https://nbbekxuvuarxkuvvvgbi.supabase.co/rest/v1/update_cache?select=ts&id=eq.1")
          echo "Supabase status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "ERRORE" && exit 1)