<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#20b8cd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#20b8cd" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0c0c0c"/>
  <!-- Radial glow overlay -->
  <rect width="512" height="512" rx="80" fill="url(#bg-glow)"/>
  <!-- Thin teal border -->
  <rect x="6" y="6" width="500" height="500" rx="75" fill="none"
        stroke="#20b8cd" stroke-width="5" opacity="0.30"/>

  <!-- Bold G — Gemelli -->
  <text x="248" y="296"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="272" font-weight="900"
        fill="#20b8cd" text-anchor="middle"
        filter="url(#glow)">G</text>

  <!-- Phone handset (cornetta) — outline, bottom-right, tilted -30° -->
  <g transform="translate(356,358) rotate(-30)"
     fill="none" stroke="#20b8cd" stroke-width="13"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#glow)">
    <!--
      Two elliptical caps (earpiece top, mouthpiece bottom)
      joined by gently inward-bowing sides — classic handset silhouette.
    -->
    <path d="M 23,-50
             A 23,16,0,0,1,-23,-50
             C -18,-30 -16,30 -23,50
             A 23,16,0,0,1,23,50
             C 18,30 16,-30 23,-50 Z"/>
  </g>
</svg>
