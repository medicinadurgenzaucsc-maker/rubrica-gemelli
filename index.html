<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Rubrica Gemelli</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rubrica">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Temi ── */
    :root {
      --header-bg:  #1a1a1a;
      --body-bg:    #f5f5f5;
      --card-bg:    #ffffff;
      --text:       #111111;
      --muted:      #666666;
      --border:     #dddddd;
      --num-bg:     #dcfce7;
      --num-text:   #15803d;
      --btn-cancel: #eeeeee;
      --modal-bg:   #ffffff;
      --accent:     #16a34a;
      --chip-active-text: #ffffff;
    }
    [data-theme="dark"] {
      --header-bg:  #080808;
      --body-bg:    #0f0f0f;
      --card-bg:    #1a1a1a;
      --text:       #f0f0f0;
      --muted:      #707070;
      --border:     #2a2a2a;
      --num-bg:     #052e16;
      --num-text:   #4ade80;
      --btn-cancel: #242424;
      --modal-bg:   #1a1a1a;
      --accent:     #22c55e;
      --chip-active-text: #0a0a0a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--body-bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2.5rem;
      transition: background .2s, color .2s;
    }

    /* ── Layout centrato 90% ── */
    .inner {
      width: 90%;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      padding: .85rem 0 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.5);
      border-bottom: 2px solid var(--accent);
      transition: background .2s;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .7rem;
    }
    .header-title {
      color: var(--accent);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .3px;
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }
    .header-count {
      color: rgba(255,255,255,.55);
      font-size: .78rem;
    }
    .btn-theme {
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-theme:active { background: rgba(255,255,255,.28); }

    #searchBar {
      width: 100%;
      padding: .7rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,.13);
      color: white;
      outline: none;
      -webkit-appearance: none;
    }
    #searchBar::placeholder { color: rgba(255,255,255,.45); }
    #searchBar:focus { background: rgba(255,255,255,.22); }

    .btn-row {
      display: flex;
      gap: .5rem;
      margin-top: .65rem;
    }
    .btn-row button {
      flex: 1;
      padding: .58rem;
      font-size: .87rem;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,.5);
      border-radius: 8px;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: background .12s, color .12s;
      font-family: inherit;
    }
    .btn-row button.active,
    .btn-row button:active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #chips {
      display: flex;
      gap: .4rem;
      overflow-x: auto;
      padding: .65rem 0 .5rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: .28rem .75rem;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.45);
      font-size: .76rem;
      font-weight: 600;
      color: rgba(255,255,255,.85);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, color .12s;
      font-family: inherit;
    }
    .chip.active { background: var(--accent); color: var(--chip-active-text); border-color: var(--accent); }

    /* ── Contatti ── */
    main { padding: .9rem 0; }

    .contact-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: .8rem .9rem;
      margin-bottom: .45rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      transition: background .2s;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-weight: 600;
      font-size: .92rem;
      color: var(--text);
      margin-bottom: .25rem;
      line-height: 1.3;
    }
    .contact-numbers { display: flex; flex-wrap: wrap; gap: .28rem; }
    .num-pill {
      display: inline-flex;
      align-items: center;
      background: var(--num-bg);
      color: var(--num-text);
      border-radius: 999px;
      padding: .16rem .58rem;
      font-size: .79rem;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      text-decoration: none;
      letter-spacing: .5px;
      transition: opacity .1s;
    }
    .num-pill:active { opacity: .75; }
    .contact-note {
      font-size: .74rem;
      color: var(--muted);
      margin-top: .25rem;
      line-height: 1.35;
    }
    .contact-cat {
      font-size: .68rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: .15rem;
      opacity: .7;
    }
    .btn-edit {
      background: none;
      border: none;
      padding: .2rem .22rem;
      cursor: pointer;
      color: var(--muted);
      border-radius: 6px;
      flex-shrink: 0;
      font-size: .95rem;
      margin-top: .05rem;
    }
    .btn-edit:active { background: var(--border); }

    .state-msg {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
    }
    .state-msg .ico { font-size: 2rem; margin-bottom: .5rem; }
    .state-msg .sub { font-size: .83rem; margin-top: .3rem; }

    /* ── Modal ── */
    #modalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    #modalOverlay[hidden] { display: none; }
    #modalBox {
      background: var(--modal-bg);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 820px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 1.35rem 1rem 1.1rem;
      padding-bottom: calc(1.1rem + env(safe-area-inset-bottom));
      transition: background .2s;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .form-group { margin-bottom: .85rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .28rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: .65rem .82rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: .93rem;
      color: var(--text);
      outline: none;
      background: var(--card-bg);
      font-family: inherit;
      transition: background .2s, border-color .15s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: .55rem; margin-top: 1.2rem; }
    .btn-primary {
      flex: 1;
      padding: .75rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:active { opacity: .82; }
    .btn-danger {
      padding: .75rem .95rem;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    [data-theme="dark"] .btn-danger { background: #450a0a; color: #f87171; }
    .btn-cancel {
      padding: .75rem .95rem;
      background: var(--btn-cancel);
      color: var(--text);
      border: none;
      border-radius: 8px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>

<header>
  <div class="inner">
    <div class="header-top">
      <div class="header-title">› Rubrica Gemelli</div>
      <div class="header-count" id="countLabel"></div>
      <button class="btn-theme" id="btnTheme" title="Cambia tema" aria-label="Cambia tema">◐</button>
    </div>
    <input type="search" id="searchBar" placeholder="Cerca nome o numero..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <div class="btn-row">
      <button id="btnAll" class="active">Mostra Tutti</button>
      <button id="btnNew">Nuovo Contatto</button>
    </div>
    <div id="chips"></div>
  </div>
</header>

<main>
  <div class="inner" id="contactList">
    <div class="state-msg">
      <div class="ico">···</div>
      <div>Caricamento rubrica...</div>
    </div>
  </div>
</main>

<div id="modalOverlay" hidden>
  <div id="modalBox">
    <div class="modal-title" id="modalTitle">Nuovo Contatto</div>
    <form id="contactForm" novalidate>
      <input type="hidden" id="fId">
      <div class="form-group">
        <label>Nome *</label>
        <input type="text" id="fNome" required placeholder="es. Cardiologia guardia">
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="fCategoria" required></select>
      </div>
      <div class="form-group">
        <label>Numeri (separati da virgola)</label>
        <input type="text" id="fNumeri" placeholder="es. 3111, 3112" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Note</label>
        <input type="text" id="fNote" placeholder="es. solo urgenze notturne">
      </div>
      <div class="modal-btns">
        <button type="button" class="btn-cancel" id="btnCancel">Annulla</button>
        <button type="button" class="btn-danger" id="btnDelete" hidden>Elimina</button>
        <button type="submit" class="btn-primary" id="btnSave">Salva</button>
      </div>
    </form>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCBaTVHVLRviELi21kH8FcPlsqrSxpIY-ZsYMbbQ-fQbpX7UcFLUx4yaqTse5ETxAc/exec';

let allContacts = [];
let categories  = [];
let activeCategory = null;
let activeSearch   = '';

// ── Tema ──────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('btnTheme').textContent = '◐';
  localStorage.setItem('rubrica-theme', theme);
}
(function initTheme() {
  const saved = localStorage.getItem('rubrica-theme') || 'dark';
  applyTheme(saved);
})();
document.getElementById('btnTheme').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  setupEvents();
  await loadData();
}

async function loadData() {
  try {
    showLoading();
    const [contacts, cats] = await Promise.all([
      apiFetch('getAll'),
      apiFetch('getCategorie'),
    ]);
    allContacts = contacts;
    categories  = cats;
    renderChips();
    renderContacts(allContacts);
  } catch (e) {
    showError(e.message);
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(action, params = {}) {
  const qs  = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${GAS_URL}?${qs}`);
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}
async function apiPost(body) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  if (!res.ok) throw new Error('Errore rete (' + res.status + ')');
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chips');
  el.innerHTML = categories.map(c =>
    `<button class="chip${activeCategory === c.nome ? ' active' : ''}" data-cat="${esc(c.nome)}">${esc(c.nome)}</button>`
  ).join('');
  el.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      activeCategory = activeCategory === cat ? null : cat;
      el.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
      document.getElementById('btnAll').classList.toggle('active', !activeCategory);
      applyFilters();
    });
  });
}

function applyFilters() {
  let result = allContacts;
  if (activeCategory) result = result.filter(c => c.categoria === activeCategory);
  if (activeSearch)   result = result.filter(c =>
    c.nome.toLowerCase().includes(activeSearch) ||
    String(c.numeri || '').includes(activeSearch)
  );
  renderContacts(result);
}

function renderContacts(contacts) {
  const el = document.getElementById('contactList');
  updateCount(contacts.length);
  if (!contacts.length) {
    el.innerHTML = '<div class="state-msg"><div class="ico">∅</div><div>Nessun risultato</div></div>';
    return;
  }
  el.innerHTML = contacts.map(c => {
    const nums  = String(c.numeri || '').split(',').map(n => n.trim()).filter(Boolean);
    const pills = nums.map(n => `<a class="num-pill" href="tel:${n}">${n}</a>`).join('');
    const note  = c.note ? `<div class="contact-note">${esc(String(c.note))}</div>` : '';
    return `
      <div class="contact-card">
        <div class="contact-info">
          <div class="contact-name">${esc(String(c.nome))}</div>
          <div class="contact-numbers">${pills}</div>
          ${note}
          <div class="contact-cat">${esc(String(c.categoria))}</div>
        </div>
        <button class="btn-edit" data-id="${c.id}" aria-label="Modifica">/</button>
      </div>`;
  }).join('');
  el.querySelectorAll('.btn-edit').forEach(btn => {
    btn.addEventListener('click', () => openEdit(btn.dataset.id));
  });
}

function showLoading() {
  document.getElementById('contactList').innerHTML =
    '<div class="state-msg"><div class="ico">···</div><div>Caricamento...</div></div>';
  updateCount(null);
}
function showError(msg) {
  document.getElementById('contactList').innerHTML =
    `<div class="state-msg"><div class="ico">×</div><div>${esc(msg)}</div><div class="sub">Controlla la connessione e riprova</div></div>`;
  updateCount(null);
}
function updateCount(n) {
  document.getElementById('countLabel').textContent = n !== null ? `${n} contatti` : '';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ────────────────────────────────────────────────────────────────────
function setupEvents() {
  document.getElementById('searchBar').addEventListener('input', e => {
    activeSearch = e.target.value.toLowerCase().trim();
    applyFilters();
  });
  document.getElementById('btnAll').addEventListener('click', () => {
    activeCategory = null;
    activeSearch   = '';
    document.getElementById('searchBar').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('btnAll').classList.add('active');
    renderContacts(allContacts);
  });
  document.getElementById('btnNew').addEventListener('click', () => openModal(null));
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  document.getElementById('contactForm').addEventListener('submit', async e => {
    e.preventDefault();
    await saveContact();
  });
  document.getElementById('btnDelete').addEventListener('click', async () => {
    if (confirm('Eliminare questo contatto?')) await deleteContact();
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(contact) {
  const isNew = !contact;
  document.getElementById('modalTitle').textContent = isNew ? 'Nuovo Contatto' : 'Modifica Contatto';
  document.getElementById('fId').value    = contact?.id ?? '';
  document.getElementById('fNome').value  = contact?.nome ?? '';
  document.getElementById('fNumeri').value = contact?.numeri ?? '';
  document.getElementById('fNote').value  = contact?.note ?? '';
  document.getElementById('btnDelete').hidden = isNew;
  document.getElementById('fCategoria').innerHTML = categories.map(c =>
    `<option value="${esc(c.nome)}"${c.nome === contact?.categoria ? ' selected' : ''}>${esc(c.nome)}</option>`
  ).join('');
  document.getElementById('modalOverlay').hidden = false;
  setTimeout(() => document.getElementById('fNome').focus(), 50);
}
function openEdit(id) {
  const c = allContacts.find(x => String(x.id) === String(id));
  if (c) openModal(c);
}
function closeModal() { document.getElementById('modalOverlay').hidden = true; }

async function saveContact() {
  const id   = document.getElementById('fId').value;
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { alert('Il nome è obbligatorio'); return; }
  const data = {
    action:    id ? 'update' : 'add',
    ...(id && { id: Number(id) }),
    nome,
    categoria: document.getElementById('fCategoria').value,
    numeri:    document.getElementById('fNumeri').value.trim(),
    note:      document.getElementById('fNote').value.trim(),
  };
  const btn = document.getElementById('btnSave');
  btn.textContent = '...'; btn.disabled = true;
  try {
    await apiPost(data);
    closeModal();
    await loadData();
  } catch (e) {
    alert('Errore: ' + e.message);
  } finally {
    btn.textContent = 'Salva'; btn.disabled = false;
  }
}
async function deleteContact() {
  const id = Number(document.getElementById('fId').value);
  try {
    await apiPost({ action: 'delete', id });
    closeModal();
    await loadData();
  } catch (e) {
    alert('Errore: ' + e.message);
  }
}

init();
</script>
</body>
</html>
